<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Severance, explained</title>
    <script>

    y=e.createElement(n);y.async=!0;y.src='https://cdn.pendo.io/agent/static/'+apiKey+'/pendo.js';

    <style>
      :root {
        color-scheme: light;
        color: #33302b;
        background: #f0ece6;
        font-family: Georgia, Cambria, "Times New Roman", Times, serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0 24px;
      }

      .column {
        width: 100%;
        max-width: 720px;
        flex: 1;
      }

      header {
        padding: 72px 0 56px;
        border-bottom: 1px solid #d8d1c8;
      }

      .wordmark {
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2rem, 5vw, 2.75rem);
        font-weight: 700;
        letter-spacing: -0.035em;
        line-height: 1.1;
        color: #1e1c18;
      }

      .tagline {
        margin-top: 12px;
        font-size: 1.05rem;
        line-height: 1.55;
        color: #7a7267;
        font-style: italic;
      }

      .form-section {
        padding: 48px 0 0;
      }

      label {
        display: block;
        font-size: 0.9rem;
        font-weight: 600;
        color: #5c564e;
        letter-spacing: 0.02em;
        margin-bottom: 12px;
      }

      textarea {
        width: 100%;
        min-height: 240px;
        border: 1px solid #cdc5ba;
        border-radius: 8px;
        padding: 20px;
        font-size: 1rem;
        line-height: 1.75;
        font-family: Georgia, serif;
        resize: vertical;
        background: #faf8f5;
        color: #33302b;
        transition: border-color 0.2s ease;
      }

      textarea:focus {
        outline: none;
        border-color: #a89880;
      }

      textarea::placeholder {
        color: #b0a89d;
      }

      .helper-text {
        margin-top: 10px;
        font-size: 0.82rem;
        color: #9b9286;
        line-height: 1.5;
      }

      .form-actions {
        margin-top: 24px;
      }

      button {
        border: none;
        border-radius: 6px;
        padding: 13px 28px;
        background: #5c4f3d;
        color: #f5f0e9;
        font-size: 0.95rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.15s ease;
        letter-spacing: 0.01em;
      }

      button:hover,
      button:focus-visible {
        background: #4a3f30;
        outline: none;
      }

      button:disabled {
        background: #b5ad9f;
        cursor: not-allowed;
      }

      #result-container {
        padding: 48px 0 0;
      }

      .result-panel {
        border-top: 1px solid #d8d1c8;
        padding-top: 40px;
      }

      .inline-disclaimer {
        display: inline-block;
        font-size: 0.82rem;
        color: #8a7f72;
        font-style: italic;
        margin-bottom: 36px;
      }

      .escalation-banner {
        margin-bottom: 40px;
        padding: 24px 28px;
        border-radius: 8px;
        background: #fef8e8;
        border-left: 3px solid #d4a94c;
        color: #5c4a1f;
      }

      .escalation-banner h2 {
        font-size: 1rem;
        font-weight: 700;
        color: #4a3a12;
        margin-bottom: 10px;
      }

      .escalation-banner p {
        font-size: 0.95rem;
        line-height: 1.7;
        margin-bottom: 8px;
      }

      .escalation-banner p:last-child {
        margin-bottom: 0;
      }

      .escalation-cta {
        font-weight: 600;
      }

      .section {
        margin-bottom: 36px;
      }

      .section:last-child {
        margin-bottom: 0;
      }

      .section-title {
        font-size: 1.05rem;
        font-weight: 700;
        color: #2a2722;
        margin-bottom: 12px;
        line-height: 1.3;
      }

      .section-content {
        white-space: pre-wrap;
        color: #4f493f;
        line-height: 1.8;
        font-size: 0.97rem;
      }

      .result-list {
        padding-left: 1.25em;
        color: #4f493f;
        line-height: 1.8;
        font-size: 0.97rem;
      }

      .result-list li {
        margin-bottom: 6px;
      }

      .result-list li:last-child {
        margin-bottom: 0;
      }

      .loading {
        padding: 32px 0;
        color: #8a7f72;
        font-size: 0.97rem;
        font-style: italic;
      }

      .error {
        padding: 20px 24px;
        border-radius: 8px;
        background: #f3e0da;
        color: #6e3328;
        border-left: 3px solid #c47060;
        font-size: 0.95rem;
        line-height: 1.6;
      }

      footer {
        width: 100%;
        max-width: 720px;
        padding: 48px 0 32px;
      }

      .footer-text {
        font-size: 0.78rem;
        color: #a39a8e;
        letter-spacing: 0.01em;
      }

      @media (max-width: 600px) {
        header {
          padding: 48px 0 36px;
        }

        .form-section {
          padding-top: 32px;
        }

        #result-container {
          padding-top: 32px;
        }

        .result-panel {
          padding-top: 28px;
        }

        footer {
          padding: 36px 0 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="column">
      <header>
        <h1 class="wordmark">Severance, explained</h1>
        <p class="tagline">Paste your severance offer and get a clear, calm breakdown of what it means and what to watch for.</p>
      </header>

      <div class="form-section">
        <form id="explain-form">
          <label for="offer-text">Your severance offer</label>
          <textarea id="offer-text" name="offerText" placeholder="Copy and paste the severance offer from your email or document." required></textarea>
          <p class="helper-text">We never store your offer. Paste only what you want explained.</p>
          <div class="form-actions">
            <button id="explain-button" type="submit">Explain this</button>
          </div>
        </form>
      </div>

      <div id="result-container"></div>
    </div>

    <footer>
      <p class="footer-text">Plain-language information, not legal advice.</p>
    </footer>

    <script>
      const form = document.getElementById('explain-form');
      const textarea = document.getElementById('offer-text');
      const button = document.getElementById('explain-button');
      const resultContainer = document.getElementById('result-container');

      function extractJSON(text) {
        const first = text.indexOf('{');
        const last = text.lastIndexOf('}');
        if (first === -1 || last === -1 || last <= first) return null;
        return text.slice(first, last + 1);
      }

      function createParaSection(title, text) {
        const section = document.createElement('section');
        section.className = 'section';

        const heading = document.createElement('h2');
        heading.className = 'section-title';
        heading.textContent = title;

        const p = document.createElement('p');
        p.className = 'section-content';
        p.textContent = text || 'No information was returned.';

        section.appendChild(heading);
        section.appendChild(p);
        return section;
      }

      function createListSection(title, items) {
        const section = document.createElement('section');
        section.className = 'section';

        const heading = document.createElement('h2');
        heading.className = 'section-title';
        heading.textContent = title;
        section.appendChild(heading);

        if (!Array.isArray(items) || items.length === 0) {
          const p = document.createElement('p');
          p.className = 'section-content';
          p.textContent = 'None identified.';
          section.appendChild(p);
        } else {
          const ul = document.createElement('ul');
          ul.className = 'result-list';
          items.forEach(item => {
            const li = document.createElement('li');
            li.textContent = item;
            ul.appendChild(li);
          });
          section.appendChild(ul);
        }
        return section;
      }

      function showLoading() {
        resultContainer.innerHTML = '';
        const loading = document.createElement('div');
        loading.className = 'loading';
        loading.textContent = 'Reading your offer...';
        resultContainer.appendChild(loading);
      }

      function showResult(parsed) {
        resultContainer.innerHTML = '';

        const panel = document.createElement('div');
        panel.className = 'result-panel';

        const disclaimer = document.createElement('p');
        disclaimer.className = 'inline-disclaimer';
        disclaimer.textContent = 'This is plain-language information, not legal advice.';
        panel.appendChild(disclaimer);

        if (parsed.escalate) {
          const banner = document.createElement('div');
          banner.className = 'escalation-banner';

          const bannerHeading = document.createElement('h2');
          bannerHeading.textContent = 'Worth a professional eye';
          banner.appendChild(bannerHeading);

          if (parsed.escalate_reason) {
            const reason = document.createElement('p');
            reason.textContent = parsed.escalate_reason;
            banner.appendChild(reason);
          }

          const cta = document.createElement('p');
          cta.className = 'escalation-cta';
          cta.textContent = 'Consider having an employment attorney review this before you sign.';
          banner.appendChild(cta);

          panel.appendChild(banner);
        }

        panel.appendChild(createParaSection("What you're being offered", parsed.offered));
        panel.appendChild(createListSection('What looks standard', parsed.standard));
        panel.appendChild(createListSection('What to look at closely', parsed.look_closely));
        panel.appendChild(createListSection('Before you sign', parsed.before_signing));

        resultContainer.appendChild(panel);
      }

      function showError(message) {
        resultContainer.innerHTML = '';
        const errorBox = document.createElement('div');
        errorBox.className = 'error';
        errorBox.textContent = message;
        resultContainer.appendChild(errorBox);
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const text = textarea.value.trim();
        if (!text) {
          showError('Please paste your severance offer text before submitting.');
          return;
        }

        button.disabled = true;
        button.textContent = 'Explaining...';
        showLoading();

        try {
          const response = await fetch('/api/explain', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text }),
          });

          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(errData.error || 'The server returned an error.');
          }

          const data = await response.json();
          const rawText = data.content?.[0]?.text ?? '';
          const jsonStr = extractJSON(rawText);
          if (!jsonStr) throw new Error('No structured response was found in the reply.');
          const parsed = JSON.parse(jsonStr);
          showResult(parsed);
        } catch (error) {
          showError('We could not process your offer right now. Please check your text and try again.');
          console.error(error);
        } finally {
          button.disabled = false;
          button.textContent = 'Explain this';
        }
      });
    </script>
  </body>
</html>
